<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Ashiq World Admin</title><link rel="stylesheet" href="styles.css"></head><body><header class="nav"><a class="brand" href="/"><img src="assets/ashiq-world-logo.png"><span>Ashiq World Admin</span></a></header><main class="checkout"><section><h2>Admin Login</h2><form id="login"><input id="email" placeholder="Admin email" required><input id="password" type="password" placeholder="Password" required><button class="submit">Login</button></form></section><aside class="summary"><h3>Orders</h3><button class="cta" onclick="loadOrders()">Refresh</button><div id="orders"></div></aside></main><div id="toast"></div><script>
const $=s=>document.querySelector(s);const fmt=n=>'৳'+Number(n||0).toLocaleString('en-BD');function toast(t){const el=$('#toast');el.textContent=t;el.classList.add('showToast');setTimeout(()=>el.classList.remove('showToast'),2200)}
$('#login').onsubmit=async e=>{e.preventDefault();const res=await fetch('/api/admin/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:$('#email').value,password:$('#password').value})});const j=await res.json();if(!res.ok)return toast(j.message);localStorage.setItem('adminToken',j.token);toast('Logged in');loadOrders()};
async function loadOrders(){const token=localStorage.getItem('adminToken');if(!token)return;const res=await fetch('/api/admin/orders',{headers:{Authorization:'Bearer '+token}});const data=await res.json();if(!res.ok)return toast(data.message||'Login required');$('#orders').innerHTML=data.map(o=>`<div class="cartRow" style="display:block"><b>#${o._id.slice(-6)} ${o.customer.name}</b><p>${o.customer.phone}<br>${o.customer.address}</p><p>Payment: ${o.payment.method} | TRX: ${o.payment.trxId||'N/A'} | ${o.payment.status}</p><p>Total: <b>${fmt(o.total)}</b></p><p>Status: ${o.status}</p><button onclick="updateOrder('${o._id}','Processing','Verified')">Verify</button> <button onclick="updateOrder('${o._id}','Delivered','Verified')">Delivered</button></div>`).join('')||'<p>No orders.</p>'}
async function updateOrder(id,status,paymentStatus){const token=localStorage.getItem('adminToken');await fetch('/api/admin/orders/'+id,{method:'PATCH',headers:{'Content-Type':'application/json',Authorization:'Bearer '+token},body:JSON.stringify({status,paymentStatus})});loadOrders()}loadOrders();
</script></body></html>
